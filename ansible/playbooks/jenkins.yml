---
- name: Installation de Jenkins
  hosts: servers
  become: yes

  tasks:
    - name: Creation du volume Jenkins
      shell: docker volume create jenkins_data

    - name: Lancement de Jenkins
      shell: |
        docker rm -f jenkins || true
        docker run -d \
          --name jenkins \
          --restart always \
          -p 8080:8080 \
          -p 50000:50000 \
          -v jenkins_data:/var/jenkins_home \
          -v /var/run/docker.sock:/var/run/docker.sock \
          jenkins/jenkins:lts

    - name: Attente demarrage Jenkins
      wait_for:
        port: 8080
        timeout: 120

    - name: Mot de passe Jenkins
      shell: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
      register: jenkins_pwd
      retries: 10
      delay: 10
      until: jenkins_pwd.rc == 0

    - name: Affichage mot de passe
      debug:
        msg: "Mot de passe Jenkins : {{ jenkins_pwd.stdout }}"
