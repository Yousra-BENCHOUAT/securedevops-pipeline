---
- name: Installation ELK Stack
  hosts: servers
  become: yes

  tasks:
    - name: Configuration vm.max_map_count pour Elasticsearch
      shell: sysctl -w vm.max_map_count=262144

    - name: Lancement Elasticsearch
      shell: |
        docker rm -f elasticsearch || true
        docker run -d \
          --name elasticsearch \
          --restart always \
          -p 9200:9200 \
          -e "discovery.type=single-node" \
          -e "ES_JAVA_OPTS=-Xms256m -Xmx256m" \
          -e "xpack.security.enabled=false" \
          elasticsearch:8.11.0

    - name: Attente Elasticsearch
      wait_for:
        port: 9200
        timeout: 120

    - name: Lancement Kibana
      shell: |
        docker rm -f kibana || true
        docker run -d \
          --name kibana \
          --restart always \
          -p 5601:5601 \
          --link elasticsearch:elasticsearch \
          -e "ELASTICSEARCH_HOSTS=http://elasticsearch:9200" \
          kibana:8.11.0

    - name: Status Docker
      shell: docker ps --format "table {{.Names}}\t{{.Status}}"
      register: status

    - name: Affichage
      debug:
        msg: "{{ status.stdout }}"
