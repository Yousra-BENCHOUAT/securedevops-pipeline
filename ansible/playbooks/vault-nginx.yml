---
- name: Installation de Vault et Nginx
  hosts: servers
  become: yes

  tasks:
    - name: Lancement de Vault
      shell: |
        docker rm -f vault || true
        docker run -d \
          --name vault \
          --restart always \
          -p 8200:8200 \
          --cap-add=IPC_LOCK \
          -e VAULT_DEV_ROOT_TOKEN_ID=myroot \
          -e VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
          hashicorp/vault:latest

    - name: Installation de Nginx
      apt:
        name: nginx
        state: present

    - name: Demarrage de Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Verification Vault
      wait_for:
        port: 8200
        timeout: 60

    - name: Status services
      shell: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
      register: docker_status

    - name: Affichage status
      debug:
        msg: "{{ docker_status.stdout }}"
